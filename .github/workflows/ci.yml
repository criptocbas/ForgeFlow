name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - run: npm ci
      - run: npm run lint --if-present
      - run: npm run typecheck --if-present || echo "Typecheck step"
      - run: npm run build --if-present || echo "Frontend build (program requires Anchor CLI separately)"
      # Future: cargo check in programs/ once Anchor is set up in CI

